name: Microsservicos CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'microsservicos/**'
      - '.github/workflows/microsservicos.yml'
  pull_request:
    branches: [main]
    paths:
      - 'microsservicos/**'
      - '.github/workflows/microsservicos.yml'

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - catalogo-service
          - estoque-service
          - auth-service-mvc
          - catalogo-service-mvc
          - estoque-service-mvc

    defaults:
      run:
        working-directory: microsservicos/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install radon xenon

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Cyclomatic complexity
        run: radon cc src/ -s -a

      - name: Maintainability index
        run: radon mi src/ -s

      - name: Quality gate (xenon)
        run: xenon src/ -b C -m B -a A
        continue-on-error: true

  deploy-ddd:
    name: Deploy ${{ matrix.service }}
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service:
          - auth-service
          - catalogo-service
          - estoque-service

    defaults:
      run:
        working-directory: microsservicos/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

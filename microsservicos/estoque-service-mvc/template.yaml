AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Estoque Service MVC — Controle de Estoque (stack independente)

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 512
    Timeout: 30
    Tracing: Active

Resources:
  EstoqueApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !ImportValue tcc-mvc-auth-authorizer-arn
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300

  # --- Health (publico) ---
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/health.handler
      CodeUri: .
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /health
            Method: get
            Auth:
              Authorizer: NONE

  # --- Estoque handler (protegido) ---
  EstoqueFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/estoque.handler
      CodeUri: .
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: ["dynamodb:GetItem","dynamodb:PutItem","dynamodb:UpdateItem","dynamodb:DeleteItem","dynamodb:Scan","dynamodb:Query"]
              Resource:
                - !GetAtt ItensEstoqueTable.Arn
                - !GetAtt MovimentacoesTable.Arn
                - !GetAtt AlertasTable.Arn
      Environment:
        Variables:
          ITENS_ESTOQUE_TABLE: !Ref ItensEstoqueTable
          MOVIMENTACOES_TABLE: !Ref MovimentacoesTable
          ALERTAS_TABLE: !Ref AlertasTable
      Events:
        Estoque:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque
            Method: GET
        EstoqueById:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque/{id}
            Method: GET
        EstoquePorProduto:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque/produto/{produto_id}
            Method: GET
        Entrada:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque/{id}/entrada
            Method: POST
        Saida:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque/{id}/saida
            Method: POST
        Movimentacoes:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque/{id}/movimentacoes
            Method: GET
        ConfigurarAlerta:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque/{id}/configurar-alerta
            Method: PATCH
        ListarAlertas:
          Type: Api
          Properties:
            RestApiId: !Ref EstoqueApi
            Path: /api/v1/estoque/{id}/alertas
            Method: GET

  # --- Event Consumer (SQS) ---
  EventConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/event_consumer.handler
      CodeUri: .
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: ["dynamodb:GetItem","dynamodb:PutItem","dynamodb:UpdateItem","dynamodb:Scan"]
              Resource: !GetAtt ItensEstoqueTable.Arn
      Environment:
        Variables:
          ITENS_ESTOQUE_TABLE: !Ref ItensEstoqueTable
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EstoqueEventosQueue.Arn
            BatchSize: 1

  # --- DynamoDB ---
  ItensEstoqueTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-mvc-estoque-itens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  MovimentacoesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-mvc-estoque-movimentacoes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  AlertasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-mvc-estoque-alertas
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # --- SQS (consome eventos do catalogo) ---
  EstoqueEventosQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: tcc-mvc-estoque-eventos
      VisibilityTimeout: 180

  EstoqueEventosSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !ImportValue tcc-mvc-catalogo-eventos-topic-arn
      Protocol: sqs
      Endpoint: !GetAtt EstoqueEventosQueue.Arn

  EstoqueQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref EstoqueEventosQueue]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: {Service: sns.amazonaws.com}
            Action: sqs:SendMessage
            Condition:
              ArnEquals:
                aws:SourceArn: !ImportValue tcc-mvc-catalogo-eventos-topic-arn
            Resource: !GetAtt EstoqueEventosQueue.Arn

Outputs:
  ApiUrl:
    Value: !Sub "https://${EstoqueApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
    Export:
      Name: tcc-mvc-estoque-api-url

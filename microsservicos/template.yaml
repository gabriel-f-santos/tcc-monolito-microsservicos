AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Microsservicos - Produtos e Estoque (Serverless)

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 512
    Timeout: 30
    Tracing: Active

Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
    Default: change-me-in-production

Resources:
  # ============================================================
  # API GATEWAY + LAMBDA AUTHORIZER
  # ============================================================

  TccApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300  # Cache TTL em segundos (5 min)

  # Lambda Authorizer — valida JWT, API Gateway cacheia resultado
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/authorizer.handler
      CodeUri: auth-service
      Description: Lambda Authorizer - valida JWT e retorna IAM policy
      MemorySize: 256
      Timeout: 5
      Environment:
        Variables:
          JWT_SECRET: !Ref JwtSecret

  # ============================================================
  # AUTH ENDPOINTS (sem autorizacao — publicos)
  # ============================================================

  AuthRegistrarFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/auth.registrar_handler
      CodeUri: auth-service
      Description: Registrar novo usuario
      Environment:
        Variables:
          USUARIOS_TABLE: !Ref UsuariosTable
          JWT_SECRET: !Ref JwtSecret
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/auth/registrar
            Method: post
            Auth:
              Authorizer: NONE  # Publico

  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/auth.login_handler
      CodeUri: auth-service
      Description: Login - gera JWT
      Environment:
        Variables:
          USUARIOS_TABLE: !Ref UsuariosTable
          JWT_SECRET: !Ref JwtSecret
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/auth/login
            Method: post
            Auth:
              Authorizer: NONE  # Publico

  AuthHealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/health.handler
      CodeUri: auth-service
      Description: Health check do Auth
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /auth/health
            Method: get
            Auth:
              Authorizer: NONE

  # ============================================================
  # CATALOGO SERVICE (protegido por Lambda Authorizer)
  # ============================================================

  CatalogoHealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/health.handler
      CodeUri: catalogo-service
      Description: Health check do Catalogo
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /catalogo/health
            Method: get
            Auth:
              Authorizer: NONE  # Health check publico

  CatalogoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/catalogo.handler
      CodeUri: catalogo-service
      Description: CRUD de produtos e categorias
      Environment:
        Variables:
          PRODUTOS_TABLE: !Ref ProdutosTable
          CATEGORIAS_TABLE: !Ref CategoriasTable
          EVENTOS_TOPIC_ARN: !Ref EventosDominioTopic
      Events:
        Produtos:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/produtos
            Method: ANY
        ProdutoById:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/produtos/{id}
            Method: ANY
        ProdutoDesativar:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/produtos/{id}/desativar
            Method: patch
        Categorias:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/categorias
            Method: ANY
        CategoriaById:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/categorias/{id}
            Method: ANY

  # ============================================================
  # ESTOQUE SERVICE (protegido por Lambda Authorizer)
  # ============================================================

  EstoqueHealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/health.handler
      CodeUri: estoque-service
      Description: Health check do Estoque
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /estoque/health
            Method: get
            Auth:
              Authorizer: NONE  # Health check publico

  EstoqueFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/estoque.handler
      CodeUri: estoque-service
      Description: Consulta e movimentacoes de estoque
      Environment:
        Variables:
          ITENS_ESTOQUE_TABLE: !Ref ItensEstoqueTable
          MOVIMENTACOES_TABLE: !Ref MovimentacoesTable
      Events:
        Estoque:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/estoque
            Method: get
        EstoqueById:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/estoque/{id}
            Method: get
        EstoquePorProduto:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/estoque/produto/{produto_id}
            Method: get
        Entrada:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/estoque/{id}/entrada
            Method: post
        Saida:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/estoque/{id}/saida
            Method: post
        Movimentacoes:
          Type: Api
          Properties:
            RestApiId: !Ref TccApi
            Path: /api/v1/estoque/{id}/movimentacoes
            Method: get

  # Consumer Lambda — consome eventos do Catalogo via SQS (sem auth)
  EstoqueEventConsumer:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/presentation/handlers/event_consumer.handler
      CodeUri: estoque-service
      Description: Consome eventos de dominio do Catalogo
      Environment:
        Variables:
          ITENS_ESTOQUE_TABLE: !Ref ItensEstoqueTable
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EstoqueEventosQueue.Arn
            BatchSize: 1

  # ============================================================
  # DYNAMODB TABLES
  # ============================================================

  UsuariosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-usuarios
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ProdutosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-produtos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  CategoriasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-categorias
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ItensEstoqueTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-itens-estoque
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  MovimentacoesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tcc-movimentacoes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ============================================================
  # MESSAGING (SNS + SQS)
  # ============================================================

  EventosDominioTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: tcc-eventos-dominio

  EstoqueEventosQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: tcc-estoque-eventos
      VisibilityTimeout: 60

  EstoqueEventosSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EventosDominioTopic
      Protocol: sqs
      Endpoint: !GetAtt EstoqueEventosQueue.Arn

  EstoqueQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EstoqueEventosQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EstoqueEventosQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventosDominioTopic

Outputs:
  ApiUrl:
    Description: URL do API Gateway
    Value: !Sub "https://${TccApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  EventosTopicArn:
    Description: ARN do topico SNS de eventos de dominio
    Value: !Ref EventosDominioTopic

name: Microsservicos CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'microsservicos/**'
      - '.github/workflows/microsservicos.yml'
  pull_request:
    branches: [main]
    paths:
      - 'microsservicos/**'
      - '.github/workflows/microsservicos.yml'
  workflow_dispatch:

jobs:
  # --- CI: 6 servicos em paralelo ---
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - catalogo-service
          - estoque-service
          - auth-service-mvc
          - catalogo-service-mvc
          - estoque-service-mvc
    defaults:
      run:
        working-directory: microsservicos/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt radon xenon
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Cyclomatic complexity
        run: radon cc src/ -s -a
      - name: Maintainability index
        run: radon mi src/ -s
      - name: Quality gate (xenon)
        run: xenon src/ -b C -m B -a A
        continue-on-error: true

  # --- CD: 3 DDD em sequencia (cross-stack refs) ---
  # Cada job separado para medir tempo de deploy individualmente

  deploy-auth:
    name: Deploy auth-service
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microsservicos/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: sam build
      - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

  deploy-catalogo:
    name: Deploy catalogo-service
    needs: deploy-auth
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microsservicos/catalogo-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: sam build
      - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

  deploy-estoque:
    name: Deploy estoque-service
    needs: deploy-catalogo
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microsservicos/estoque-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: sam build
      - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

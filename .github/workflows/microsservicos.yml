name: Microsservicos CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'microsservicos/**'
      - '.github/workflows/microsservicos.yml'
  pull_request:
    branches: [main]
    paths:
      - 'microsservicos/**'
      - '.github/workflows/microsservicos.yml'

env:
  SAM_STACK_NAME: tcc-microsservicos

jobs:
  test:
    name: Test & Quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, catalogo-service, estoque-service]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: microsservicos/${{ matrix.service }}
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: microsservicos/${{ matrix.service }}
        run: pytest tests/ -v --tb=short

      - name: Cyclomatic complexity
        working-directory: microsservicos/${{ matrix.service }}
        run: radon cc src/ -s -a

      - name: Maintainability index
        working-directory: microsservicos/${{ matrix.service }}
        run: radon mi src/ -s

  deploy:
    name: SAM Build & Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microsservicos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        env:
          S3_BUCKET: ${{ secrets.SAM_S3_BUCKET }}
        run: |
          sam deploy \
            --stack-name "$SAM_STACK_NAME" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket "$S3_BUCKET" \
            --capabilities CAPABILITY_IAM

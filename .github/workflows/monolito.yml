name: Monolito CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'monolito/**'
      - '.github/workflows/monolito.yml'
  pull_request:
    branches: [main]
    paths:
      - 'monolito/**'
      - '.github/workflows/monolito.yml'
  workflow_dispatch:

env:
  WORKING_DIR: monolito

jobs:
  test:
    name: Test & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --tb=short

      - name: Cyclomatic complexity
        run: |
          mkdir -p metrics
          radon cc src/ -s -a -j > metrics/cc-report.json
          radon cc src/ -s -a

      - name: Maintainability index
        run: |
          mkdir -p metrics
          radon mi src/ -s -j > metrics/mi-report.json
          radon mi src/ -s

      - name: Quality gate (xenon)
        run: xenon src/ -b B -m A -a A

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monolito-metrics
          path: monolito/metrics/

  deploy:
    name: Build & Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" -t "$ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY" --all-tags

      - name: Trigger ASG Instance Refresh
        env:
          ASG_NAME: ${{ secrets.ASG_NAME }}
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 100, "InstanceWarmup": 300}'

      - name: Wait for Instance Refresh
        env:
          ASG_NAME: ${{ secrets.ASG_NAME }}
        run: |
          echo "Waiting for instance refresh to complete..."
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "Successful" ]; then
              echo "Deploy complete!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed: $STATUS"
              exit 1
            fi
            sleep 30
          done
